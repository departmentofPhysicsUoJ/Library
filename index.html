<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Of Physics University Of Jammu Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        .header-container {
            background-color: var(--primary-color);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header-container h1 {
            margin: 0 0 20px 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .search-wrapper {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            border: 2px solid transparent;
            border-radius: 30px;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        #searchInput:focus {
            border-color: var(--accent-color);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .library-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .book-cover {
            width: 140px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            background-color: #e2e8f0;
        }

        .title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            margin: 0 0 8px 0;
            color: var(--primary-color);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .author {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 600;
        }
        
        .isbn-badge {
            margin-top: auto;
            padding-top: 15px;
            font-size: 11px;
            color: #94a3b8;
        }

        .error-message {
            text-align: center;
            color: #ef4444;
            font-weight: 600;
            grid-column: 1 / -1;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 28px;
            font-weight: bold;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover { color: #ef4444; }

        .modal-body {
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            gap: 30px;
        }

        @media(min-width: 600px) {
            .modal-body { flex-direction: row; }
        }

        #modalCover {
            width: 200px;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            margin: 0 auto;
        }

        .modal-info { flex-grow: 1; }
        
        #modalTitle { margin: 0 0 10px 0; color: var(--primary-color); font-size: 24px; line-height: 1.3;}
        #modalAuthor { margin: 0 0 15px 0; color: var(--text-muted); font-size: 18px; font-weight: 400;}
        .modal-meta { font-size: 14px; color: #94a3b8; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 15px;}
        .modal-desc { font-size: 15px; line-height: 1.6; color: var(--text-main); margin-bottom: 20px;}
        .tag { 
            display: inline-block; 
            background: #e0f2fe; 
            color: #0369a1; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
            margin: 0 8px 8px 0;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Department Of Physics University Of Jammu Library</h1>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Search by title or author..." disabled>
        </div>
    </div>

    <div class="library-container">
        <div class="grid" id="bookGrid"></div>
    </div>

    <div id="bookModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div class="modal-body">
                <img id="modalCover" src="" alt="Book Cover">
                <div class="modal-info">
                    <h2 id="modalTitle">Title</h2>
                    <h4 id="modalAuthor">Author</h4>
                    <p class="modal-meta" id="modalMeta"></p>
                    <div class="modal-tags" id="modalTags"></div>
                    <div class="modal-desc" id="modalDesc">Loading description...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bookGrid = document.getElementById('bookGrid');
        const searchInput = document.getElementById('searchInput');
        
        const modal = document.getElementById('bookModal');
        const closeModalBtn = document.getElementById('closeModal');
        const modalCover = document.getElementById('modalCover');
        const modalTitle = document.getElementById('modalTitle');
        const modalAuthor = document.getElementById('modalAuthor');
        const modalMeta = document.getElementById('modalMeta');
        const modalDesc = document.getElementById('modalDesc');
        const modalTags = document.getElementById('modalTags');

        let booksArray = [];

        fetch('books.json')
            .then(response => response.json())
            .then(data => {
                booksArray = Object.values(data);
                searchInput.disabled = false;
                displayBooks(booksArray);

                searchInput.addEventListener('keyup', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const filteredBooks = booksArray.filter(book => {
                        const titleMatch = (book.title || "").toLowerCase().includes(searchTerm);
                        const authorMatch = (book.primaryauthor || "").toLowerCase().includes(searchTerm);
                        return titleMatch || authorMatch;
                    });
                    displayBooks(filteredBooks);
                });
            })
            .catch(error => {
                bookGrid.innerHTML = `<div class="error-message"><p>Could not load books.json.</p></div>`;
            });

        async function findBookCover(isbn, imgElement) {
            if (!isbn) {
                imgElement.src = 'https://placehold.co/140x200/e2e8f0/64748b?text=No+ISBN';
                return;
            }
            try {
                const gbResponse = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
                const gbData = await gbResponse.json();
                if (gbData.items && gbData.items[0].volumeInfo.imageLinks) {
                    imgElement.src = gbData.items[0].volumeInfo.imageLinks.thumbnail.replace('http:', 'https:');
                    return;
                }
                const obdResponse = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
                const obdData = await obdResponse.json();
                if (obdData && obdData[0] && obdData[0].summary && obdData[0].summary.cover) {
                    imgElement.src = obdData[0].summary.cover;
                    return; 
                }
                const olUrl = `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;
                const olResponse = await fetch(olUrl);
                if (olResponse.ok) {
                    imgElement.src = olUrl;
                    return;
                }
                imgElement.src = 'https://placehold.co/140x200/e2e8f0/64748b?text=Cover+Not\\nAvailable';
            } catch (error) {
                imgElement.src = 'https://placehold.co/140x200/e2e8f0/64748b?text=Network\\nError';
            }
        }

        function openModal(book, coverSrc, isbn) {
            modalTitle.textContent = book.title || "Unknown Title";
            modalAuthor.textContent = book.primaryauthor || "Unknown Author";
            modalCover.src = coverSrc; 
            
            let metaString = [];
            if (book.publication) metaString.push(book.publication);
            if (book.date) metaString.push(`Year: ${book.date}`);
            metaString.push(`ISBN: ${isbn || 'N/A'}`);
            if (book.copies) metaString.push(`Copies in Stock: ${book.copies}`); 
            
            modalMeta.textContent = metaString.join(' • ');
            modalDesc.innerHTML = "<i>Searching global databases for details...</i>";
            modalTags.innerHTML = "";
            modal.classList.add('active');

            async function fetchDetails() {
                try {
                    let info = null;
                    
                    // Attempt 1: Strict ISBN Search
                    if (isbn) {
                        const res1 = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
                        if (res1.ok) {
                            const data1 = await res1.json();
                            if (data1.items && data1.items[0].volumeInfo && data1.items[0].volumeInfo.description) {
                                info = data1.items[0].volumeInfo;
                            }
                        }
                    }
                    
                    // Attempt 2: Broad Title Search (The fix from your debugger!)
                    if (!info && book.title) {
                        // Strip out things like "(4TH ED.)" to make the search broader
                        const cleanTitle = book.title.replace(/\(.*\)/g, '').trim();
                        // Just search for the raw title and author string
                        const searchQuery = encodeURIComponent(`${cleanTitle} ${book.primaryauthor || ''}`);
                        const res2 = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${searchQuery}`);
                        
                        if (res2.ok) {
                            const data2 = await res2.json();
                            if (data2.items) {
                                // Find the first result that actually has a description
                                const validItem = data2.items.find(item => item.volumeInfo && item.volumeInfo.description);
                                if (validItem) {
                                    info = validItem.volumeInfo;
                                }
                            }
                        }
                    }

                    // Display the results
                    if (info) {
                        modalDesc.innerHTML = info.description;
                        if (info.categories) {
                            info.categories.forEach(category => {
                                const span = document.createElement('span');
                                span.className = 'tag';
                                span.textContent = category;
                                modalTags.appendChild(span);
                            });
                        }
                    } else {
                        // Attempt 3: Local Fallback
                        if (book.summary) {
                            modalDesc.innerHTML = `<p style="color: #64748b; font-size: 13px; margin-bottom: 10px;"><em>(Global database empty. Showing local record).</em></p>
                                                   <p><strong>Summary:</strong> ${book.summary}</p>`;
                        } else {
                            modalDesc.innerHTML = "No detailed description available online. Please add a manual summary to your books.json file.";
                        }
                    }

                } catch (error) {
                    if (book.summary) {
                         modalDesc.innerHTML = `<p style="color: #64748b; font-size: 13px; margin-bottom: 10px;"><em>(Network Error. Showing local record).</em></p>
                                                <p><strong>Summary:</strong> ${book.summary}</p>`;
                    } else {
                         modalDesc.innerHTML = "Network timeout. Could not load additional details at this time.";
                    }
                }
            }
            fetchDetails();
        }

        closeModalBtn.addEventListener('click', () => { modal.classList.remove('active'); });
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

        function displayBooks(books) {
            bookGrid.innerHTML = ''; 
            if (books.length === 0) {
                bookGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #64748b;">No books found matching your search.</p>';
                return;
            }
            books.forEach(book => {
                const title = book.title || "Unknown Title";
                const author = book.primaryauthor || "Unknown Author";
                let isbn = book.originalisbn || "";
                if (!isbn && book.isbn) {
                   isbn = Array.isArray(book.isbn) ? book.isbn[0] : (book.isbn["0"] || "");
                }
                
                const card = document.createElement('div');
                card.className = 'card';
                
                const img = document.createElement('img');
                img.className = 'book-cover';
                img.alt = `Cover of ${title}`;
                img.src = 'https://placehold.co/140x200/e2e8f0/64748b?text=Loading...'; 

                const details = document.createElement('div');
                details.innerHTML = `
                    <h2 class="title">${title}</h2>
                    <p class="author">${author}</p>
                    <p class="isbn-badge">ISBN: ${isbn || 'N/A'}</p>
                `;

                card.appendChild(img);
                card.appendChild(details);
                bookGrid.appendChild(card);

                card.addEventListener('click', () => openModal(book, img.src, isbn));

                if (book.local_cover) {
                    img.src = book.local_cover; 
                } else {
                    findBookCover(isbn, img);
                }
            });
        }
    </script>
</body>
</html>
